<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#15110d" />
  <title>Vintage Clock</title>
  <style>
    :root {
      --bg: #15110d;
      --panel: rgba(26, 20, 15, 0.94);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f3eadf;
      --muted: #c8b9a8;
      --accent: #c8a96b;
      --button: #30261d;
      --button-hover: #443629;
      --danger: #8d4038;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at center, #2a2118 0%, #18120e 48%, #0d0a08 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
    }

    .clock-stage {
      position: relative;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .clock-shell {
      position: relative;
      width: min(82vmin, 900px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #5d4327 0 56%, #2d1d11 57% 64%, #8b673b 65% 68%, #21140c 69% 100%);
      box-shadow:
        0 0 0 10px rgba(0,0,0,0.35),
        inset 0 0 40px rgba(255,255,255,0.08),
        inset 0 0 90px rgba(0,0,0,0.7),
        var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clock-face {
      position: relative;
      width: 82%;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle, #f1e2bd 0%, #e1c991 63%, #b49357 100%);
      box-shadow:
        inset 0 0 20px rgba(74, 42, 15, 0.55),
        0 0 0 4px #2b1c10;
    }

    .dial-image,
    .default-dial {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .dial-image {
      display: none;
      object-fit: contain;
      background: #000;
      z-index: 2;
    }

    .default-dial {
      z-index: 1;
    }

    .default-dial::before {
      content: "";
      position: absolute;
      inset: 4%;
      border-radius: 50%;
      border: 2px solid rgba(69, 42, 18, 0.75);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.12);
    }

    .numeral {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10%;
      height: 12%;
      margin-left: -5%;
      margin-top: -6%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #21150d;
      font-weight: 700;
      font-size: clamp(18px, 3.6vmin, 48px);
      transform:
        rotate(calc(var(--i) * 30deg))
        translateY(-355%)
        rotate(calc(var(--i) * -30deg));
      text-shadow: 0 1px 0 rgba(255,255,255,0.45);
    }

    .minute-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0.35%;
      height: 4.5%;
      background: rgba(38, 23, 13, 0.86);
      transform-origin: 50% 0;
      transform:
        rotate(calc(var(--i) * 6deg))
        translateY(-1020%);
    }

    .minute-mark.major {
      width: 0.8%;
      height: 7%;
      background: #1f140c;
      transform:
        rotate(calc(var(--i) * 6deg))
        translateY(-690%);
    }

    .brand {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(45, 28, 16, 0.82);
      font-size: clamp(12px, 1.8vmin, 24px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 3;
      white-space: nowrap;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      z-index: 5;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,0.45));
    }

    .hour-hand {
      width: 2.2%;
      height: 25%;
      margin-left: -1.1%;
      background: linear-gradient(to right, #111 0%, #3d2b1b 50%, #111 100%);
    }

    .minute-hand {
      width: 1.5%;
      height: 34%;
      margin-left: -0.75%;
      background: linear-gradient(to right, #111 0%, #4f3822 50%, #111 100%);
    }

    .second-hand {
      width: 0.55%;
      height: 38%;
      margin-left: -0.275%;
      background: #8d211d;
      z-index: 6;
    }

    .second-hand::after {
      content: "";
      position: absolute;
      width: 180%;
      height: 18%;
      left: -40%;
      top: 100%;
      background: #8d211d;
      border-radius: 999px;
    }

    .center-cap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4.5%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #e7c27b 0%, #8b612d 40%, #2f1b0c 100%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.55);
      z-index: 8;
    }

    .panel {
      height: 100%;
      padding: 24px 20px;
      background: var(--panel);
      border-left: 1px solid var(--panel-border);
      overflow-y: auto;
      box-shadow: -10px 0 30px rgba(0,0,0,0.22);
    }

    .panel h1 {
      margin: 0 0 6px;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .panel .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .control-group {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--panel-border);
    }

    .control-group:last-child {
      border-bottom: 0;
    }

    .control-group label,
    .group-title {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="file"],
    select,
    input[type="time"],
    button {
      width: 100%;
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: var(--button);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    input[type="file"] {
      padding: 8px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:active {
      transform: translateY(1px);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .danger {
      background: var(--danger);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 10px 0;
      color: var(--text);
      font-size: 14px;
    }

    .switch-row input {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .quiet-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status {
      margin-top: 10px;
      min-height: 1.4em;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .floating-controls {
      display: none;
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 30;
    }

    .floating-controls button {
      width: auto;
      min-width: 126px;
      background: rgba(20,15,11,0.84);
      backdrop-filter: blur(8px);
    }

    body.controls-hidden {
      grid-template-columns: 1fr;
    }

    body.controls-hidden .panel {
      display: none;
    }

    body.controls-hidden .floating-controls {
      display: block;
    }

    body.controls-hidden .clock-shell {
      width: min(92vmin, 1050px);
    }

    @media (max-width: 900px) {
      html, body {
        overflow: auto;
      }

      body {
        display: block;
      }

      .clock-stage {
        min-height: 72vh;
      }

      .panel {
        height: auto;
        border-left: 0;
        border-top: 1px solid var(--panel-border);
      }

      body.controls-hidden .clock-stage {
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main class="clock-stage">
    <div class="clock-shell" aria-label="Analog clock">
      <div class="clock-face">
        <div class="default-dial" id="defaultDial"></div>
        <img id="dialImage" class="dial-image" alt="Uploaded clock face" />
        <div class="brand">Vintage Clock</div>

        <div id="hourHand" class="hand hour-hand"></div>
        <div id="minuteHand" class="hand minute-hand"></div>
        <div id="secondHand" class="hand second-hand"></div>
        <div class="center-cap"></div>
      </div>
    </div>
  </main>

  <aside class="panel">
    <h1>Vintage Clock</h1>
    <p class="subtitle">Turn a tablet or computer screen into a working vintage clock display.</p>

    <section class="control-group">
      <label for="imagePicker">Clock Face Image</label>
      <input id="imagePicker" type="file" accept="image/*" />
      <div class="button-row" style="margin-top:8px;">
        <button id="removeImageButton" type="button">Use Default Dial</button>
        <button id="fitButton" type="button">Toggle Image Fit</button>
      </div>
      <div id="imageStatus" class="status">No custom image selected.</div>
    </section>

    <section class="control-group">
      <div class="group-title">Display</div>
      <label class="switch-row">
        <span>Show Second Hand</span>
        <input id="secondHandToggle" type="checkbox" checked />
      </label>
      <button id="fullscreenButton" type="button">Enter Fullscreen</button>
      <button id="hideControlsButton" type="button" style="margin-top:8px;">Hide Controls</button>
    </section>

    <section class="control-group">
      <div class="group-title">Chime</div>
      <label class="switch-row">
        <span>Enable Westminster Chime</span>
        <input id="chimeToggle" type="checkbox" />
      </label>
      <label class="switch-row">
        <span>Strike the Hour</span>
        <input id="strikeToggle" type="checkbox" checked />
      </label>
      <button id="testChimeButton" type="button">Test Chime</button>
      <div id="audioStatus" class="status">Sound is off.</div>
    </section>

    <section class="control-group">
      <div class="group-title">Quiet Hours</div>
      <label class="switch-row">
        <span>Enable Quiet Hours</span>
        <input id="quietToggle" type="checkbox" checked />
      </label>
      <div class="quiet-grid">
        <div>
          <label for="quietStart">Start</label>
          <input id="quietStart" type="time" value="22:00" />
        </div>
        <div>
          <label for="quietEnd">End</label>
          <input id="quietEnd" type="time" value="07:00" />
        </div>
      </div>
    </section>
  </aside>

  <div class="floating-controls">
    <button id="showControlsButton" type="button">Show Controls</button>
  </div>

  <script>
    "use strict";

    const romanNumerals = ["XII", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI"];
    const defaultDial = document.getElementById("defaultDial");

    for (let i = 0; i < 60; i += 1) {
      const mark = document.createElement("div");
      mark.className = "minute-mark" + (i % 5 === 0 ? " major" : "");
      mark.style.setProperty("--i", i);
      defaultDial.appendChild(mark);
    }

    romanNumerals.forEach((value, index) => {
      const numeral = document.createElement("div");
      numeral.className = "numeral";
      numeral.style.setProperty("--i", index);
      numeral.textContent = value;
      defaultDial.appendChild(numeral);
    });

    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");

    const imagePicker = document.getElementById("imagePicker");
    const dialImage = document.getElementById("dialImage");
    const removeImageButton = document.getElementById("removeImageButton");
    const fitButton = document.getElementById("fitButton");
    const imageStatus = document.getElementById("imageStatus");

    const secondHandToggle = document.getElementById("secondHandToggle");
    const fullscreenButton = document.getElementById("fullscreenButton");
    const hideControlsButton = document.getElementById("hideControlsButton");
    const showControlsButton = document.getElementById("showControlsButton");

    const chimeToggle = document.getElementById("chimeToggle");
    const strikeToggle = document.getElementById("strikeToggle");
    const testChimeButton = document.getElementById("testChimeButton");
    const audioStatus = document.getElementById("audioStatus");

    const quietToggle = document.getElementById("quietToggle");
    const quietStart = document.getElementById("quietStart");
    const quietEnd = document.getElementById("quietEnd");

    let uploadedImageUrl = "";
    let lastChimedHourKey = "";
    let imageFitMode = "contain";
    let audioContext = null;

    function updateClock() {
      const now = new Date();
      const milliseconds = now.getMilliseconds();
      const seconds = now.getSeconds() + milliseconds / 1000;
      const minutes = now.getMinutes() + seconds / 60;
      const hours = (now.getHours() % 12) + minutes / 60;

      hourHand.style.transform = `rotate(${hours * 30}deg)`;
      minuteHand.style.transform = `rotate(${minutes * 6}deg)`;
      secondHand.style.transform = `rotate(${seconds * 6}deg)`;

      maybePlayHourlyChime(now);
      requestAnimationFrame(updateClock);
    }

    imagePicker.addEventListener("change", () => {
      const file = imagePicker.files && imagePicker.files[0];

      if (!file) {
        return;
      }

      if (!file.type.startsWith("image/")) {
        imageStatus.textContent = "Please choose a valid image file.";
        return;
      }

      if (uploadedImageUrl) {
        URL.revokeObjectURL(uploadedImageUrl);
      }

      uploadedImageUrl = URL.createObjectURL(file);
      dialImage.onload = () => {
        dialImage.style.display = "block";
        imageStatus.textContent = `Using: ${file.name}`;
      };
      dialImage.onerror = () => {
        imageStatus.textContent = "The image could not be loaded.";
      };
      dialImage.src = uploadedImageUrl;
    });

    removeImageButton.addEventListener("click", () => {
      if (uploadedImageUrl) {
        URL.revokeObjectURL(uploadedImageUrl);
        uploadedImageUrl = "";
      }

      dialImage.removeAttribute("src");
      dialImage.style.display = "none";
      imagePicker.value = "";
      imageStatus.textContent = "No custom image selected.";
    });

    fitButton.addEventListener("click", () => {
      imageFitMode = imageFitMode === "contain" ? "cover" : "contain";
      dialImage.style.objectFit = imageFitMode;
      imageStatus.textContent = imageFitMode === "contain"
        ? "Image fit: show the full image."
        : "Image fit: fill the clock face.";
    });

    secondHandToggle.addEventListener("change", () => {
      secondHand.style.display = secondHandToggle.checked ? "block" : "none";
    });

    hideControlsButton.addEventListener("click", () => {
      document.body.classList.add("controls-hidden");
    });

    showControlsButton.addEventListener("click", () => {
      document.body.classList.remove("controls-hidden");
    });

    fullscreenButton.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullscreenButton.textContent = "Exit Fullscreen";
        } else {
          await document.exitFullscreen();
          fullscreenButton.textContent = "Enter Fullscreen";
        }
      } catch (error) {
        console.error(error);
        fullscreenButton.textContent = "Fullscreen Unavailable";
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreenButton.textContent = document.fullscreenElement
        ? "Exit Fullscreen"
        : "Enter Fullscreen";
    });

    function getAudioContext() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          throw new Error("Web Audio is not supported in this browser.");
        }
        audioContext = new AudioContextClass();
      }
      return audioContext;
    }

    function playBellNote(frequency, startTime, duration = 1.2, volume = 0.16) {
      const context = getAudioContext();
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(context.destination);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.05);
    }

    function playWestminsterSequence(includeStrike = false, hour = new Date().getHours()) {
      const context = getAudioContext();

      if (context.state === "suspended") {
        context.resume();
      }

      const start = context.currentTime + 0.08;
      const notes = [
        { frequency: 659.25, offset: 0.00 },
        { frequency: 523.25, offset: 0.42 },
        { frequency: 587.33, offset: 0.84 },
        { frequency: 392.00, offset: 1.26 }
      ];

      notes.forEach(note => {
        playBellNote(note.frequency, start + note.offset, 1.0, 0.14);
      });

      if (includeStrike) {
        const strikeCount = hour % 12 || 12;
        const strikeStart = start + 2.2;

        for (let i = 0; i < strikeCount; i += 1) {
          playBellNote(261.63, strikeStart + i * 1.05, 1.6, 0.20);
        }
      }
    }

    function timeToMinutes(value) {
      const [hours, minutes] = value.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function isQuietTime(date) {
      if (!quietToggle.checked) {
        return false;
      }

      const current = date.getHours() * 60 + date.getMinutes();
      const start = timeToMinutes(quietStart.value);
      const end = timeToMinutes(quietEnd.value);

      if (start === end) {
        return false;
      }

      if (start < end) {
        return current >= start && current < end;
      }

      return current >= start || current < end;
    }

    function maybePlayHourlyChime(now) {
      if (!chimeToggle.checked) {
        return;
      }

      if (isQuietTime(now)) {
        return;
      }

      if (now.getMinutes() !== 0 || now.getSeconds() !== 0) {
        return;
      }

      const hourKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}`;

      if (hourKey === lastChimedHourKey) {
        return;
      }

      lastChimedHourKey = hourKey;
      playWestminsterSequence(strikeToggle.checked, now.getHours());
    }

    chimeToggle.addEventListener("change", async () => {
      if (chimeToggle.checked) {
        try {
          const context = getAudioContext();
          if (context.state === "suspended") {
            await context.resume();
          }
          audioStatus.textContent = "Hourly chime is enabled.";
        } catch (error) {
          console.error(error);
          chimeToggle.checked = false;
          audioStatus.textContent = "Sound is unavailable in this browser.";
        }
      } else {
        audioStatus.textContent = "Sound is off.";
      }
    });

    testChimeButton.addEventListener("click", async () => {
      try {
        const context = getAudioContext();
        if (context.state === "suspended") {
          await context.resume();
        }
        playWestminsterSequence(strikeToggle.checked, new Date().getHours());
        audioStatus.textContent = "Playing test chime.";
      } catch (error) {
        console.error(error);
        audioStatus.textContent = "Sound is unavailable in this browser.";
      }
    });

    window.addEventListener("beforeunload", () => {
      if (uploadedImageUrl) {
        URL.revokeObjectURL(uploadedImageUrl);
      }
    });

    updateClock();
  </script>
</body>
</html>
